name: CI/CD Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/jira-be

jobs:
  # ─────────── Job 1: Fast feedback (lint, types, unit tests) ───────────
  test:
    name: Lint, Type-check, Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint:check

      - name: Run TypeScript type-check
        run: npm run type-check

      - name: Run Jest unit tests
        run: npm run test:run

  # ─────────── Job 2: E2E tests with real Postgres ───────────
  e2e-test:
    name: E2E Tests (Supertest + Postgres)
    needs: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jira_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/jira_test
      PORT: "3031"
      JWT_SECRET: test-jwt-secret-for-ci-only
      TOKEN_VERIFY_EXPIRY: "900"
      JWT_ACCESS_TOKEN_EXPIRATION: "900"
      JWT_REFRESH_TOKEN_EXPIRATION: "604800"
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: test
      RESEND_API_KEY: test-key
      SUPABASE_URL: http://localhost
      SUPABASE_SERVICE_KEY: test-key
      SUPABASE_STORAGE_BUCKET: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations on test DB
        run: npx prisma migrate deploy

      - name: Run Jest E2E tests
        run: npm run test:e2e

  # ─────────── Job 3: Build Docker image (only on push to main) ───────────
  build:
    name: Build & Push Docker Image
    needs: e2e-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────── Job 4: SSH deploy to server ───────────
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/projects/jira/jira-be
            git pull origin main
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            docker compose up -d --force-recreate
            docker image prune -f

  # ─────────── Job 5: Consolidated Telegram notification ───────────
  notify:
    name: Notify Telegram
    needs: [test, e2e-test, build, deploy]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "stage=success" >> $GITHUB_OUTPUT
            echo "icon=✅" >> $GITHUB_OUTPUT
            echo "title=Backend Deploy Success" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "stage=test" >> $GITHUB_OUTPUT
            echo "icon=🛑" >> $GITHUB_OUTPUT
            echo "title=Deploy BLOCKED — Lint/Type/Unit test failed" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.e2e-test.result }}" == "failure" ]]; then
            echo "stage=e2e" >> $GITHUB_OUTPUT
            echo "icon=🛑" >> $GITHUB_OUTPUT
            echo "title=Deploy BLOCKED — E2E test failed" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "stage=build" >> $GITHUB_OUTPUT
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "title=Docker Build Failed" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "stage=deploy" >> $GITHUB_OUTPUT
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "title=Deploy Failed" >> $GITHUB_OUTPUT
          else
            echo "stage=skipped" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: steps.status.outputs.stage != 'skipped'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ${{ steps.status.outputs.icon }} *${{ steps.status.outputs.title }}*

            *Repo:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}
            *Message:* ${{ github.event.head_commit.message }}

            [View Action](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
