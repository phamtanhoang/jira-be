name: CI/CD Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/jira-be

jobs:
  # ─────────── Job 1: Fast feedback (lint, types, unit tests) ───────────
  test:
    name: Lint, Type-check, Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint:check

      - name: Run TypeScript type-check
        run: npm run type-check

      - name: Run Jest unit tests
        run: npm run test:run

  # ─────────── Job 2: E2E Tests (TEMPORARILY DISABLED — too slow) ───────────
  # To re-enable: uncomment the block below AND change `build.needs: test` to `build.needs: e2e-test`
  # Files kept: test/e2e/*.e2e-spec.ts — run locally with `npm run test:e2e` (needs a reachable DATABASE_URL)
  #
  # e2e-test:
  #   name: E2E Tests (Supertest + Postgres)
  #   needs: test
  #   runs-on: ubuntu-latest
  #   services:
  #     postgres:
  #       image: postgres:16
  #       env:
  #         POSTGRES_USER: test
  #         POSTGRES_PASSWORD: test
  #         POSTGRES_DB: jira_test
  #       ports:
  #         - 5432:5432
  #       options: >-
  #         --health-cmd pg_isready
  #         --health-interval 10s
  #         --health-timeout 5s
  #         --health-retries 5
  #   env:
  #     DATABASE_URL: postgresql://test:test@localhost:5432/jira_test
  #     PORT: "3031"
  #     JWT_SECRET: test-jwt-secret-for-ci-only
  #     TOKEN_VERIFY_EXPIRY: "900"
  #     JWT_ACCESS_TOKEN_EXPIRATION: "900"
  #     JWT_REFRESH_TOKEN_EXPIRATION: "604800"
  #     CORS_ORIGIN: http://localhost:3000
  #     NODE_ENV: test
  #     RESEND_API_KEY: test-key
  #     SUPABASE_URL: http://localhost
  #     SUPABASE_SERVICE_KEY: test-key
  #     SUPABASE_STORAGE_BUCKET: test
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #         cache: "npm"
  #     - run: npm ci
  #     - run: npx prisma generate
  #     - run: npx prisma migrate deploy
  #     - run: npm run test:e2e

  # ─────────── Job 3: Build Docker image (only on push to main) ───────────
  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────── Job 4: SSH deploy to server ───────────
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/jira/jira-be
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            docker compose up -d --force-recreate
            docker image prune -f

      - name: Verify deployment (health check)
        run: |
          echo "Waiting for BE to be ready..."
          sleep 15
          for i in 1 2 3 4 5 6; do
            if curl -sf https://api.jira.3hteam.io.vn/health > /dev/null; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/6 failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 75s — BE not responding 200 on /health"
          exit 1

  # ─────────── Job 5: Consolidated Telegram notification ───────────
  notify:
    name: Notify Telegram
    needs: [test, build, deploy]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "stage=success" >> $GITHUB_OUTPUT
            echo "icon=✅" >> $GITHUB_OUTPUT
            echo "title=Backend Deploy Success" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "stage=test" >> $GITHUB_OUTPUT
            echo "icon=🛑" >> $GITHUB_OUTPUT
            echo "title=Deploy BLOCKED — Lint/Type/Unit test failed" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "stage=build" >> $GITHUB_OUTPUT
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "title=Docker Build Failed" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "stage=deploy" >> $GITHUB_OUTPUT
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "title=Deploy Failed" >> $GITHUB_OUTPUT
          else
            echo "stage=skipped" >> $GITHUB_OUTPUT
          fi

      # HTML format is used instead of Markdown because raw commit messages
      # often contain unbalanced `_` `*` `[` `(` that break Markdown parsing
      # mid-message ("can't find end of the entity" error from Telegram).
      # HTML only requires escaping `< > &`, which commit messages rarely have.
      - name: Prepare Telegram message
        id: prepare-telegram-message
        run: |
          python - <<'PY'
          import html, os

          icon = os.getenv('STAGE_ICON', '')
          title = os.getenv('STAGE_TITLE', '')
          repo = os.getenv('GITHUB_REPOSITORY', '')
          branch = os.getenv('GITHUB_REF_NAME', '')
          commit = os.getenv('GITHUB_SHA', '')
          author = os.getenv('GITHUB_ACTOR', '')
          message = os.getenv('GITHUB_EVENT_HEAD_COMMIT_MESSAGE', '')
          server_url = os.getenv('GITHUB_SERVER_URL', '')
          run_id = os.getenv('GITHUB_RUN_ID', '')
          output_path = os.environ['GITHUB_OUTPUT']

          escaped_message = html.escape(message, quote=False)
          payload = f"""{icon} <b>{html.escape(title)}</b>

          <b>Repo:</b> <code>{html.escape(repo)}</code>
          <b>Branch:</b> <code>{html.escape(branch)}</code>
          <b>Commit:</b> <code>{html.escape(commit)}</code>
          <b>Author:</b> {html.escape(author)}
          <b>Message:</b> <code>{escaped_message}</code>

          <a href=\"{html.escape(server_url)}/{html.escape(repo)}/actions/runs/{html.escape(run_id)}\">View Action</a>"""

          with open(output_path, 'a', encoding='utf-8') as f:
              f.write('telegram_message<<EOF\n')
              f.write(payload + '\n')
              f.write('EOF\n')
          PY
        env:
          STAGE_ICON: ${{ steps.status.outputs.icon }}
          STAGE_TITLE: ${{ steps.status.outputs.title }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Send Telegram notification
        if: steps.status.outputs.stage != 'skipped'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: ${{ steps.prepare-telegram-message.outputs.telegram_message }}
